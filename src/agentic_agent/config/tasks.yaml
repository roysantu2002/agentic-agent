research_task:
  description: >
    Conduct structured research to identify and organize
    the astrological, numerological, and spiritual causes
    behind women’s menstrual disorders, especially prolonged
    or excessive bleeding, along with holistic remedies.

    The research must include:

      - Astrological causes of menstrual imbalance
      - Moon-related hormonal disturbances
      - Mars-related blood and bleeding disorders
      - Venus influence on reproductive health
      - Rahu/Ketu karmic health influences
      - Birth number and life path analysis
      - Numerology patterns linked to female health
      - Chakra imbalance assessment
      - Sacral chakra energy disturbances
      - Element imbalance (water/fire)
      - Emotional and karmic contributors
      - Gemstone recommendations
      - Planetary mantra healing methods
      - Yantra-based remedies
      - Fasting and ritual practices
      - Spiritual cleansing techniques
      - Lifestyle corrections through astrology
      - Integration with Ayurveda and holistic wellness

    Apply structural constraints:

      - Clear Beginner / Intermediate / Advanced segmentation
      - Logical progression from causes to remedies
      - No misleading or unsafe recommendations
      - Practical and easy-to-follow guidance
      - Authentic Vedic alignment
      - Structured cause and remedy categorization

    For each finding include:

      - Cause or remedy name
      - Level classification (Beginner / Intermediate / Advanced)
      - Planet or number association
      - Short practical explanation
      - Example real-world application

  expected_output: >
    A structured astrology and numerology healing blueprint containing:

      - Executive overview
      - Level-wise understanding summary
      - Planet-wise categorization
      - Number-wise categorization
      - Complete structured cause list
      - Complete structured remedy list
      - Healing progression roadmap
      - Gemstone and mantra mapping
      - Preventive wellness framework
      - Final holistic balance summary

  agent: researcher



reporting_task:
  description: >
    Transform the validated research into a clean,
    consolidated astrology and numerology healing
    framework document ensuring clarity, authenticity,
    and holistic relevance.

    Ensure the document is:

      - Clearly structured and logically progressive
      - Balanced across astrology and numerology
      - Free from unsafe or misleading content
      - Strongly aligned with Vedic principles
      - Practical and implementation-ready
      - Suitable for guidance and wellness planning

  expected_output: >
    A finalized markdown document containing:

      - Executive overview
      - Level distribution summary
      - Planet distribution summary
      - Numerology distribution summary
      - Structured complete cause list
      - Structured complete remedy list
      - Healing roadmap summary
      - Gemstone and mantra validation
      - Practical wellness application summary
      - Final holistic validation statement

  agent: reporting_analyst
  context:
    - research_task
  output_file: output/womens_menstrual_healing_astrology_numerology_framework_01.md